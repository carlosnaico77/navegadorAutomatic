<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scraper | Dashboard Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Dashboard Header -->
        <header>
           <div class="status-badge">
                <div class="status-dot"></div>
                Sistema en Línea
            </div>
        </header>

        <!-- Main Action Section -->
        <section class="hero-section">
            <h1>Clona la web con elegancia.</h1>
            <p class="subtitle">Herramienta profesional de extracción y mirroring automático de alta fidelidad.</p>
            
            <div class="input-box">
                <input type="text" id="url-input" placeholder="Ingresa una URL (ej: https://example.com)" autocomplete="off">
                <button id="scan-btn">Escaneo Rápido</button>
            </div>
        </section>

        <!-- Main Workspace Grid -->
        <div class="content-grid">
            
            <!-- Left Panel: Results Grid -->
            <main class="results-panel">
                <div class="results-header">
                    <h2>Explorador de Clones</h2>
                    <button id="refresh-btn" class="refresh-btn" title="Actualizar lista">↻</button>
                </div>
                
                <div class="results-grid" id="results-grid">
                    <!-- Cards injected by app.js -->
                    <div class="status-message">Cargando biblioteca de clones...</div>
                </div>
            </main>

            <!-- Right Panel: Terminal Console -->
            <aside class="terminal-wrapper">
                <div class="terminal-header">
                    <div class="terminal-dot" style="background: #ff5f56;"></div>
                    <div class="terminal-dot" style="background: #ffbd2e;"></div>
                    <div class="terminal-dot" style="background: #27c93f;"></div>
                    <span class="terminal-title">Monitor de Sistema</span>
                </div>
                <div class="terminal-body" id="logs-container">
                    <div class="log-entry">Esperando órdenes en el puerto 3000...</div>
                </div>
            </aside>

        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
